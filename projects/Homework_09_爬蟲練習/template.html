<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電影資料庫 | Movie Database</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','微軟正黑體',Arial,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
a{color:#7cb7ff;text-decoration:none}

/* ===== Hero ===== */
.hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:40px 20px;text-align:center;border-bottom:2px solid #e94560}
.hero h1{font-size:2rem;margin-bottom:8px;color:#e94560}
.hero p{color:#8892b0;font-size:.95rem}
.stats-bar{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:20px}
.stat-item{background:rgba(255,255,255,.06);border-radius:12px;padding:16px 24px;min-width:100px}
.stat-item .num{font-size:1.6rem;font-weight:700;color:#e94560}
.stat-item .label{font-size:.75rem;color:#8892b0;margin-top:4px}

/* ===== Toolbar ===== */
.toolbar{max-width:1320px;margin:0 auto;padding:20px 20px 0;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{background:#1a1a2e;border:1px solid #2a2a4a;color:#e0e0e0;padding:10px 14px;border-radius:8px;font-size:.9rem;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:#e94560}
.toolbar input{flex:1;min-width:200px}
.toolbar select{min-width:120px;cursor:pointer}
.toolbar select option{background:#1a1a2e}

/* ===== Grid ===== */
.container{max-width:1320px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
@media(max-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.grid{grid-template-columns:1fr}}

/* ===== Card ===== */
.card{background:#1a1a2e;border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;border:1px solid #2a2a4a;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(233,69,96,.15);border-color:#e94560}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#0f0f1a}
.card-body{padding:12px}
.card-title{font-size:.95rem;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-en{font-size:.75rem;color:#8892b0;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:.7rem;color:#8892b0;line-height:1.5}
.card-cats{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.card-cats span{background:rgba(233,69,96,.2);color:#e94560;padding:2px 6px;border-radius:4px;font-size:.65rem}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #2a2a4a}
.card-score{font-size:1.4rem;font-weight:700;color:#e94560}
.card-score small{font-size:.7rem;color:#8892b0}
.card-country{font-size:.68rem;color:#8892b0;max-width:60%;text-align:right}

/* ===== Modal ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:999;justify-content:center;align-items:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#1a1a2e;border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid #2a2a4a}
.modal-header{position:relative}
.modal-header img{width:100%;max-height:400px;object-fit:cover;border-radius:16px 16px 0 0}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;line-height:36px;text-align:center}
.modal-body{padding:24px}
.modal-body h2{font-size:1.5rem;margin-bottom:4px}
.modal-body .en-name{color:#8892b0;margin-bottom:16px}
.modal-body .score-big{font-size:3rem;font-weight:700;color:#e94560}
.modal-body .info-row{display:flex;gap:24px;flex-wrap:wrap;margin:16px 0}
.modal-body .info-item{color:#8892b0;font-size:.85rem}
.modal-body .info-item strong{color:#e0e0e0;display:block}

/* ===== Chart ===== */
.chart-section{max-width:1320px;margin:0 auto;padding:0 20px 40px}
.chart-section h2{font-size:1.2rem;color:#e94560;margin-bottom:16px}
.chart-bar{margin-bottom:8px;display:flex;align-items:center;gap:10px}
.chart-bar .label{width:50px;text-align:right;font-size:.78rem;color:#8892b0;flex-shrink:0}
.chart-bar .track{flex:1;background:#2a2a4a;border-radius:4px;height:22px;overflow:hidden}
.chart-bar .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#e94560,#533483);transition:width .5s}
.chart-bar .count{width:36px;font-size:.75rem;color:#8892b0;flex-shrink:0}

/* ===== Footer ===== */
.no-result{text-align:center;padding:60px;color:#8892b0;grid-column:1/-1}
.count-info{text-align:center;padding:8px;color:#8892b0;font-size:.8rem}

/* ===== Chat ===== */
.chat-bubble{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#e94560;border:none;cursor:pointer;z-index:998;box-shadow:0 4px 16px rgba(233,69,96,.4);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;transition:transform .2s}
.chat-bubble:hover{transform:scale(1.1)}
.chat-panel{position:fixed;bottom:96px;right:24px;width:360px;height:500px;background:#1a1a2e;border-radius:16px;border:1px solid #2a2a4a;z-index:997;display:none;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.chat-panel.open{display:flex}
.chat-header{background:linear-gradient(135deg,#e94560,#533483);padding:14px 18px;font-weight:700;font-size:1rem;display:flex;justify-content:space-between;align-items:center}
.chat-header button{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:.82rem;line-height:1.5;animation:fadeIn .3s}
.chat-msg.bot{background:#2a2a4a;align-self:flex-start;border-bottom-left-radius:4px}
.chat-msg.user{background:#e94560;align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg .movie-link{cursor:pointer;color:#7cb7ff;text-decoration:underline}
.chat-quick{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px;border-top:1px solid #2a2a4a}
.chat-quick button{background:#2a2a4a;border:1px solid #3a3a5a;color:#e0e0e0;padding:6px 12px;border-radius:16px;font-size:.72rem;cursor:pointer;transition:background .2s}
.chat-quick button:hover{background:#e94560;border-color:#e94560}
.chat-input-wrap{display:flex;padding:10px 16px;border-top:1px solid #2a2a4a;gap:8px}
.chat-input-wrap input{flex:1;background:#2a2a4a;border:1px solid #3a3a5a;color:#e0e0e0;padding:10px 14px;border-radius:20px;font-size:.82rem;outline:none}
.chat-input-wrap input:focus{border-color:#e94560}
.chat-input-wrap button{background:#e94560;border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;flex-shrink:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.chat-panel{width:calc(100vw - 32px);right:16px;bottom:88px;height:420px}}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <h1>Movie Database</h1>
  <p>Scrape Center SSR1 — 100 部經典電影</p>
  <div class="stats-bar" id="statsBar"></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <input type="text" id="search" placeholder="搜尋電影名稱..." oninput="render()">
  <select id="categoryFilter" onchange="render()">
    <option value="">全部類別</option>
  </select>
  <select id="countryFilter" onchange="render()">
    <option value="">全部國家</option>
  </select>
  <select id="sortBy" onchange="render()">
    <option value="id">預設排序</option>
    <option value="score">評分高→低</option>
    <option value="score_asc">評分低→高</option>
    <option value="name">名稱 A→Z</option>
  </select>
</div>

<!-- Grid -->
<div class="container">
  <div class="count-info" id="countInfo"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Category Chart -->
<div class="chart-section">
  <h2>類別分布</h2>
  <div id="categoryChart"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<!-- Chat Bubble -->
<button class="chat-bubble" id="chatBubble" onclick="toggleChat()">💬</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <span>🎬 電影小幫手</span>
    <button onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg bot">嗨！我可以幫你查詢電影資料 👋<br>試試下方快捷鍵或直接輸入關鍵字～</div>
  </div>
  <div class="chat-quick" id="chatQuick">
    <button onclick="askQuick('評分最高')">🏆 評分最高</button>
    <button onclick="askQuick('動畫')">🎨 動畫</button>
    <button onclick="askQuick('日本')">🗾 日本電影</button>
    <button onclick="askQuick('stats')">📊 統計數據</button>
    <button onclick="askQuick('最長')">⏱ 片長最長</button>
    <button onclick="askQuick('年份')">📅 年份分布</button>
  </div>
  <div class="chat-input-wrap">
    <input type="text" id="chatInput" placeholder="輸入關鍵字..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
// ===== Data =====
const DATA = {{DATA}};
let filteredData = [...DATA];

// ===== Init =====
function init() {
  // Stats
  const total = DATA.length;
  const scores = DATA.map(m => m.score);
  const avg = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2);
  const allCats = new Set();
  const allCountries = new Set();
  DATA.forEach(m => {
    m.categories.split('、').filter(Boolean).forEach(c => allCats.add(c));
    m.country.split('、').filter(Boolean).forEach(c => allCountries.add(c.trim()));
  });

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="num">${total}</div><div class="label">總電影數</div></div>
    <div class="stat-item"><div class="num">${avg}</div><div class="label">平均評分</div></div>
    <div class="stat-item"><div class="num">${allCats.size}</div><div class="label">類別數</div></div>
    <div class="stat-item"><div class="num">${allCountries.size}</div><div class="label">國家/地區</div></div>
  `;

  // Category filter
  const catSel = document.getElementById('categoryFilter');
  [...allCats].sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    catSel.appendChild(opt);
  });

  // Country filter
  const ctrySel = document.getElementById('countryFilter');
  [...allCountries].sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    ctrySel.appendChild(opt);
  });

  // Chart
  const catCount = {};
  DATA.forEach(m => {
    m.categories.split('、').filter(Boolean).forEach(c => {
      catCount[c] = (catCount[c]||0) + 1;
    });
  });
  const sorted = Object.entries(catCount).sort((a,b) => b[1] - a[1]);
  const maxCnt = sorted[0]?.[1] || 1;
  document.getElementById('categoryChart').innerHTML = sorted.map(([name,cnt]) => `
    <div class="chart-bar">
      <span class="label">${name}</span>
      <div class="track"><div class="fill" style="width:${(cnt/maxCnt*100).toFixed(1)}%"></div></div>
      <span class="count">${cnt}</span>
    </div>
  `).join('');

  render();
}

// ===== Filter & Sort =====
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const ctry = document.getElementById('countryFilter').value;
  const sort = document.getElementById('sortBy').value;

  let result = [...DATA];

  if (q) result = result.filter(m => m.name_cn.includes(q) || m.name_en.toLowerCase().includes(q));
  if (cat) result = result.filter(m => m.categories.includes(cat));
  if (ctry) result = result.filter(m => m.country.includes(ctry));

  if (sort === 'score') result.sort((a,b) => b.score - a.score);
  else if (sort === 'score_asc') result.sort((a,b) => a.score - b.score);
  else if (sort === 'name') result.sort((a,b) => a.name_en.localeCompare(b.name_en));
  else result.sort((a,b) => a.id - b.id);

  filteredData = result;
}

// ===== Render =====
function render() {
  applyFilters();
  const grid = document.getElementById('grid');
  document.getElementById('countInfo').textContent = `顯示 ${filteredData.length} / ${DATA.length} 部電影`;

  if (!filteredData.length) {
    grid.innerHTML = '<div class="no-result">沒有符合的電影</div>';
    return;
  }

  grid.innerHTML = filteredData.map(m => {
    const cats = m.categories.split('、').filter(Boolean).map(c => `<span>${c}</span>`).join('');
    const poster = m.poster_file ? `posters/${m.poster_file}` : m.cover_url;
    return `
    <div class="card" onclick="openModal(${m.id})">
      <img class="card-img" src="${poster}" alt="${m.name_cn}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22300%22><rect fill=%22%231a1a2e%22 width=%22200%22 height=%22300%22/><text fill=%22%238892b0%22 x=%22100%22 y=%22150%22 text-anchor=%22middle%22 font-size=%2214%22>No Image</text></svg>'">
      <div class="card-body">
        <div class="card-title">${m.name_cn}</div>
        <div class="card-en">${m.name_en}</div>
        <div class="card-cats">${cats}</div>
        <div class="card-meta">${m.duration} | ${m.release_date || '上映日未知'}</div>
        <div class="card-footer">
          <div class="card-score">${m.score}<small> 分</small></div>
          <div class="card-country">${m.country}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== Modal =====
function openModal(id) {
  const m = DATA.find(x => x.id === id);
  if (!m) return;
  const cats = m.categories.split('、').filter(Boolean).map(c => `<span>${c}</span>`).join(' ');
  const poster = m.poster_file ? `posters/${m.poster_file}` : m.cover_url;
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <img src="${poster}" alt="${m.name_cn}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22700%22 height=%22400%22><rect fill=%22%231a1a2e%22 width=%22700%22 height=%22400%22/></svg>'">
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <h2>${m.name_cn} <small class="en-name">${m.name_en}</small></h2>
      <div class="score-big">${m.score}</div>
      <div class="info-row">
        <div class="info-item"><strong>類別</strong> ${cats}</div>
        <div class="info-item"><strong>國家</strong> ${m.country}</div>
        <div class="info-item"><strong>片長</strong> ${m.duration}</div>
        <div class="info-item"><strong>上映</strong> ${m.release_date || '-'}</div>
      </div>
      <a href="${m.detail_url}" target="_blank" style="display:inline-block;margin-top:12px;padding:8px 20px;background:#e94560;color:#fff;border-radius:8px;">查看原始頁面</a>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ===== Start =====
init();
</script>
</body>
</html>
