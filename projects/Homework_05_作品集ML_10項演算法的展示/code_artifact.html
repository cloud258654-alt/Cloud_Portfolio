        // 1. 線性回歸實驗
        function setupLinearRegression(wrapper, controls) {
            const cv = document.createElement("canvas");
            cv.width = 500;
            cv.height = 300;
            cv.className = "cursor-crosshair w-full h-full block";
            wrapper.appendChild(cv);
            const cx = cv.getContext("2d");

            let points = [
                {x: 100, y: 220}, {x: 180, y: 190}, {x: 250, y: 160}, {x: 350, y: 120}, {x: 420, y: 90}
            ];

            function draw() {
                cx.clearRect(0, 0, 500, 300);
                
                // 畫格線
                cx.strokeStyle = "rgba(0,0,0,0.04)";
                cx.lineWidth = 1;
                for (let i = 0; i < 500; i += 20) {
                    cx.beginPath(); cx.moveTo(i, 0); cx.lineTo(i, 300); cx.stroke();
                }
                for (let j = 0; j < 300; j += 20) {
                    cx.beginPath(); cx.moveTo(0, j); cx.lineTo(500, j); cx.stroke();
                }

                // 計算最小二乘法 OLS
                if (points.length >= 2) {
                    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
                    points.forEach(p => {
                        sumX += p.x; sumY += p.y;
                        sumXY += p.x * p.y;
                        sumXX += p.x * p.x;
                    });
                    const n = points.length;
                    const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
                    const intercept = (sumY - slope * sumX) / n;

                    // 繪製回歸線
                    cx.beginPath();
                    cx.strokeStyle = "#3b82f6";
                    cx.lineWidth = 3;
                    cx.shadowColor = "#3b82f6";
                    cx.shadowBlur = 10;
                    
                    const x1 = 0; const y1 = slope * x1 + intercept;
                    const x2 = 500; const y2 = slope * x2 + intercept;
                    cx.moveTo(x1, y1);
                    cx.lineTo(x2, y2);
                    cx.stroke();
                    cx.shadowBlur = 0; // 重置陰影

                    // 繪製殘差線
                    cx.strokeStyle = "rgba(244, 63, 94, 0.65)";
                    cx.lineWidth = 1;
                    cx.setLineDash([4, 4]);
                    points.forEach(p => {
                        const predY = slope * p.x + intercept;
                        cx.beginPath();
                        cx.moveTo(p.x, p.y);
                        cx.lineTo(p.x, predY);
                        cx.stroke();
                    });
                    cx.setLineDash([]);
                }

                // 畫點
                points.forEach(p => {
                    cx.beginPath();
                    cx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                    cx.fillStyle = "#10b981";
                    cx.shadowColor = "#10b981";
                    cx.shadowBlur = 8;
                    cx.fill();
                    cx.shadowBlur = 0;
                });
            }

            cv.addEventListener("click", (e) => {
                const rect = cv.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (500 / rect.width);
                const y = (e.clientY - rect.top) * (300 / rect.height);
                points.push({x, y});
                draw();
            });

            // 控制項：清除點
            const btnClear = document.createElement("button");
            btnClear.className = "px-3 py-1 bg-rose-500/20 hover:bg-rose-500/35 border border-rose-500/30 text-rose-300 rounded-lg text-xs font-semibold transition";
            btnClear.innerText = "清除全部點";
            btnClear.onclick = () => { points = []; draw(); };
            controls.appendChild(btnClear);

            draw();
        }

        // 2. 邏輯回歸實驗

            // 使用 DOM 構建交互

                <div class="w-full mt-6">
                    <label class="block text-xs font-semibold text-slate-300 mb-2 flex justify-between">

                </div>
            `;

            const slider = document.getElementById("threshold-slider");
            const boundary = document.getElementById("logistic-boundary");
            const container = document.getElementById("logistic-points-container");
            const label = document.getElementById("threshold-val");

            // 預置點
            const rawPoints = [
                {x: 10, val: 0.05}, {x: 25, val: 0.12}, {x: 38, val: 0.22}, {x: 45, val: 0.35},
                {x: 52, val: 0.61}, {x: 65, val: 0.78}, {x: 78, val: 0.88}, {x: 90, val: 0.96}
            ];

            function update() {
                const threshold = parseFloat(slider.value);
                label.innerText = threshold.toFixed(2);
                
                // 閥值對應的位置 (百分比)
                const boundaryPercent = threshold * 100;
                boundary.style.left = `${boundaryPercent}%`;

                container.innerHTML = "";
                rawPoints.forEach(p => {
                    const el = document.createElement("div");
                    el.className = "absolute w-5 h-5 rounded-full border-2 flex items-center justify-center font-bold text-[9px] transition-all duration-300 transform -translate-y-1/2";
                    el.style.top = "50%";
                    el.style.left = `${p.x}%`;
                    
                    // 根據當前大於小於閾值判斷顏色
                    if (p.val >= threshold) {
                        el.className += " bg-emerald-500/20 border-emerald-500 text-emerald-400 shadow-md shadow-emerald-500/10";
                        el.innerText = "B";
                    } else {
                        el.className += " bg-rose-500/20 border-rose-500 text-rose-400 shadow-md shadow-rose-500/10";
                        el.innerText = "A";
                    }
                    container.appendChild(el);
                });
            }

            slider.addEventListener("input", update);
            update();
        }

            const outcomeEl = document.getElementById("rf-outcome");

            btn.onclick = () => {
                let yesVotes = 0;
                treeEls.forEach((el, index) => {
                    el.className = "text-xs font-bold mt-1 text-slate-500 animate-pulse";
                    el.innerText = "分析中";
                    
                    setTimeout(() => {
                        const isYes = Math.random() > 0.4;
                        if (isYes) yesVotes++;
                        el.innerText = isYes ? "購買" : "不買";
                        el.className = `text-xs font-bold mt-1 ${isYes ? 'text-emerald-400' : 'text-rose-400'}`;
                    }, (index + 1) * 150);
                });

                setTimeout(() => {
                    if (yesVotes >= 3) {
                        outcomeEl.innerText = "【購買】 (多數決)";
                        outcomeEl.className = "font-bold text-emerald-400";
                    } else {
                        outcomeEl.innerText = "【不買】 (多數決)";
                        outcomeEl.className = "font-bold text-rose-400";
                    }
                }, 1000);
            };
        }

        // 5. GBDT (梯度提升樹) 模擬
        function setupGBDT(wrapper, controls) {
            const cv = document.createElement("canvas");
            cv.width = 500;
            cv.height = 300;
            cv.className = "w-full h-full block";
            wrapper.appendChild(cv);
            const cx = cv.getContext("2d");

            // 特徵控制項
            controls.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400">提升步數 (弱學習器數量):</span>
                    <input type="range" id="gbdt-steps" min="1" max="15" step="1" value="3" class="w-24 accent-indigo-500">
                    <span id="gbdt-steps-val" class="text-xs text-indigo-400 font-bold font-mono">3</span>
                </div>
            `;

            const slider = document.getElementById("gbdt-steps");
            const label = document.getElementById("gbdt-steps-val");

            // 生成帶有雜訊的複雜曲線點
            const dataPoints = [];
            for (let i = 20; i < 480; i += 12) {
                // 真實函數 + 隨機擾動
                const targetY = 150 + 70 * Math.sin(i * 0.02) + 20 * Math.cos(i * 0.05);
                dataPoints.push({ x: i, y: targetY });
            }

            function draw() {
                cx.clearRect(0, 0, 500, 300);
                const steps = parseInt(slider.value);
                label.innerText = steps;

                // 畫點
                cx.fillStyle = "rgba(71, 85, 105, 0.45)";
                dataPoints.forEach(p => {
                    cx.beginPath();
                    cx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    cx.fill();
                });

                // 模擬 GBDT 的強擬合曲線
                cx.beginPath();
                cx.strokeStyle = "#06b6d4";
                cx.lineWidth = 3;
                cx.shadowColor = "#06b6d4";
                cx.shadowBlur = 8;

                // 使用階梯函數逼近 (提升樹多為階梯回歸樹)
                const segmentWidth = 500 / (steps * 2);
                for (let x = 0; x < 500; x++) {
                    // 根據當前階數，模擬逼近
                    const stepIndex = Math.floor(x / segmentWidth);
                    // 利用偽隨機公式逼近正弦線
                    const y = 150 + 70 * Math.sin(stepIndex * segmentWidth * 0.02) + (10 / steps) * Math.sin(x * 0.2);
                    if (x === 0) cx.moveTo(x, y);
                    else cx.lineTo(x, y);
                }
                cx.stroke();
                cx.shadowBlur = 0;
            }

            slider.addEventListener("input", draw);
            draw();
        }

        // 6. 支持向量機 SVM 實驗
        function setupSVM(wrapper, controls) {
            const cv = document.createElement("canvas");
            cv.width = 500;
            cv.height = 300;
            cv.className = "cursor-pointer w-full h-full block";
            wrapper.appendChild(cv);
            const cx = cv.getContext("2d");

            // 控制器
            controls.innerHTML = `
                <div class="flex gap-2">
                    <button id="svm-red" class="px-2.5 py-1 text-xs bg-rose-500/20 border border-rose-500 text-rose-300 rounded-lg font-bold transition">放置 A 類點</button>
                    <button id="svm-blue" class="px-2.5 py-1 text-xs bg-blue-500/20 border border-blue-500 text-blue-300 rounded-lg font-bold transition">放置 B 類點</button>
                </div>
            `;

            let currentClass = 'A';
            const btnRed = document.getElementById("svm-red");
            const btnBlue = document.getElementById("svm-blue");

            btnRed.onclick = () => { currentClass = 'A'; selectBtn(btnRed, btnBlue); };
            btnBlue.onclick = () => { currentClass = 'B'; selectBtn(btnBlue, btnRed); };

            function selectBtn(active, inactive) {
                active.classList.add("bg-opacity-40");
                inactive.classList.remove("bg-opacity-40");
            }

            // 初始化一些樣本點
            const points = [
                {x: 100, y: 100, class: 'A'}, {x: 150, y: 80, class: 'A'}, {x: 120, y: 150, class: 'A'},
                {x: 350, y: 220, class: 'B'}, {x: 400, y: 180, class: 'B'}, {x: 380, y: 250, class: 'B'}
            ];

            function draw() {
                cx.clearRect(0, 0, 500, 300);

                // 計算兩類幾何中心，繪製簡單的SVM線性超平面
                const ptsA = points.filter(p => p.class === 'A');
                const ptsB = points.filter(p => p.class === 'B');

                if (ptsA.length && ptsB.length) {
                    let cAx = 0, cAy = 0, cBx = 0, cBy = 0;
                    ptsA.forEach(p => { cAx += p.x; cAy += p.y; });
                    ptsB.forEach(p => { cBx += p.x; cBy += p.y; });
                    cAx /= ptsA.length; cAy /= ptsA.length;
                    cBx /= ptsB.length; cBy /= ptsB.length;

                    // 中心連線中點
                    const midX = (cAx + cBx) / 2;
                    const midY = (cAy + cBy) / 2;

                    // 斜率
                    const dx = cBx - cAx;
                    const dy = cBy - cAy;
                    const normalSlope = -dx / (dy || 0.001); // 垂直法線斜率

                    // 畫幾何最大間隔超平面
                    cx.beginPath();
                    cx.strokeStyle = "#a855f7";
                    cx.lineWidth = 3;
                    cx.shadowColor = "#a855f7";
                    cx.shadowBlur = 8;
                    cx.moveTo(midX - 250, midY - 250 * normalSlope);
                    cx.lineTo(midX + 250, midY + 250 * normalSlope);
                    cx.stroke();
                    cx.shadowBlur = 0;

                    // 劃出最大間隔虛線
                    cx.strokeStyle = "rgba(168, 85, 247, 0.35)";
                    cx.setLineDash([5, 5]);
                    cx.lineWidth = 1.5;
                    
                    // SVM 邊界 A
                    cx.beginPath();
                    cx.moveTo(midX - 250, (midY - 25) - 250 * normalSlope);
                    cx.lineTo(midX + 250, (midY - 25) + 250 * normalSlope);
                    cx.stroke();

                    // SVM 邊界 B
                    cx.beginPath();
                    cx.moveTo(midX - 250, (midY + 25) - 250 * normalSlope);
                    cx.lineTo(midX + 250, (midY + 25) + 250 * normalSlope);
                    cx.stroke();

                    cx.setLineDash([]);
                }

                // 畫點
                points.forEach(p => {
                    cx.beginPath();
                    cx.arc(p.x, p.y, 7, 0, Math.PI * 2);
                    cx.fillStyle = p.class === 'A' ? "#f43f5e" : "#3b82f6";
                    cx.fill();
                    cx.strokeStyle = "white";
                    cx.lineWidth = 1.5;
                    cx.stroke();
                });
            }

            cv.addEventListener("click", (e) => {
                const rect = cv.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (500 / rect.width);
                const y = (e.clientY - rect.top) * (300 / rect.height);
                points.push({x, y, class: currentClass});
                draw();
            });

            // 清除點
            const btnClear = document.createElement("button");
            btnClear.className = "px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-semibold transition border border-slate-700";
            btnClear.innerText = "清除全部";
            btnClear.onclick = () => { points.length = 0; draw(); };
            controls.appendChild(btnClear);

            selectBtn(btnRed, btnBlue);
            draw();
        }

        // 7. KNN 實驗
        function setupKNN(wrapper, controls) {
            const cv = document.createElement("canvas");
            cv.width = 500;
            cv.height = 300;
            cv.className = "cursor-crosshair w-full h-full block";
            wrapper.appendChild(cv);
            const cx = cv.getContext("2d");

            controls.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400">K 值 (鄰居數):</span>
                    <input type="range" id="knn-k" min="1" max="9" step="2" value="3" class="w-20 accent-indigo-500">
                    <span id="knn-k-val" class="text-xs text-indigo-400 font-bold font-mono">3</span>
                </div>
            `;

            const slider = document.getElementById("knn-k");
            const label = document.getElementById("knn-k-val");

            // 生成兩類聚落
            const points = [];
            // A類 (紅色)
            for (let i = 0; i < 15; i++) {
                points.push({ x: 100 + Math.random() * 120, y: 80 + Math.random() * 120, class: 'A' });
            }
            // B類 (藍色)
            for (let i = 0; i < 15; i++) {
                points.push({ x: 280 + Math.random() * 120, y: 100 + Math.random() * 120, class: 'B' });
            }

            let mousePos = { x: 250, y: 150 };

            function getDistance(p1, p2) {
                return Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
            }

            function draw() {
                cx.clearRect(0, 0, 500, 300);
                const k = parseInt(slider.value);
                label.innerText = k;

                // 畫現有數據點
                points.forEach(p => {
                    cx.beginPath();
                    cx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    cx.fillStyle = p.class === 'A' ? "#f43f5e" : "#3b82f6";
                    cx.fill();
                });

                // 計算所有點到滑鼠的距離
                const distances = points.map(p => ({
                    point: p,
                    dist: getDistance(p, mousePos)
                })).sort((a, b) => a.dist - b.dist);

                const kNearest = distances.slice(0, k);

                // 畫 K-NN 連線與判定
                let countA = 0;
                kNearest.forEach(n => {
                    cx.beginPath();
                    cx.strokeStyle = "rgba(100, 116, 139, 0.4)";
                    cx.lineWidth = 1;
                    cx.moveTo(mousePos.x, mousePos.y);
                    cx.lineTo(n.point.x, n.point.y);
                    cx.stroke();

                    if (n.point.class === 'A') countA++;
                });

                const resultClass = countA > (k / 2) ? 'A' : 'B';

                // 畫測試點 (滑鼠位置)
                cx.beginPath();
                cx.arc(mousePos.x, mousePos.y, 8, 0, Math.PI * 2);
                cx.fillStyle = "#eab308"; // 黃色
                cx.shadowColor = "#eab308";
                cx.shadowBlur = 12;
                cx.fill();
                cx.shadowBlur = 0;

                // 外側光圈代表判定類別
                cx.beginPath();
                cx.arc(mousePos.x, mousePos.y, 16, 0, Math.PI * 2);
                cx.strokeStyle = resultClass === 'A' ? "rgba(244, 63, 94, 0.6)" : "rgba(59, 130, 246, 0.6)";
                cx.lineWidth = 2;
                cx.stroke();
            }

            cv.addEventListener("mousemove", (e) => {
                const rect = cv.getBoundingClientRect();
                mousePos.x = (e.clientX - rect.left) * (500 / rect.width);
                mousePos.y = (e.clientY - rect.top) * (300 / rect.height);
                draw();
            });

            slider.addEventListener("input", draw);
            draw();
        }

        // 8. K-Means 聚類實驗
        function setupKMeans(wrapper, controls) {
            const cv = document.createElement("canvas");
            cv.width = 500;
            cv.height = 300;
            cv.className = "w-full h-full block";
            wrapper.appendChild(cv);
            const cx = cv.getContext("2d");

            // 控制項：手動迭代
            controls.innerHTML = `
                <div class="flex gap-2">
                    <button id="kmeans-init" class="px-2.5 py-1 text-xs bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-300 rounded font-semibold transition">重新隨機點</button>
                    <button id="kmeans-step" class="px-2.5 py-1 text-xs bg-indigo-600 hover:bg-indigo-500 text-white rounded font-bold transition">迭代下一步 (Step)</button>
                </div>
            `;

            const btnInit = document.getElementById("kmeans-init");
            const btnStep = document.getElementById("kmeans-step");

            let points = [];
            let centroids = [];
            const k = 3;
            const colors = ["#f43f5e", "#3b82f6", "#10b981"];

            function initData() {
                points = [];
                centroids = [];
                // 產生3個不均勻的分佈群
                for (let i = 0; i < 45; i++) {
                    const cluster = i % 3;
                    let rx, ry;
                    if (cluster === 0) { rx = 100 + Math.random() * 80; ry = 80 + Math.random() * 80; }
                    else if (cluster === 1) { rx = 320 + Math.random() * 80; ry = 80 + Math.random() * 80; }
                    else { rx = 210 + Math.random() * 100; ry = 180 + Math.random() * 80; }
                    points.push({ x: rx, y: ry, cluster: -1 });
                }

                // 隨機選3個點作為初始質心
                for (let i = 0; i < k; i++) {
                    centroids.push({ x: 50 + Math.random() * 400, y: 50 + Math.random() * 200, color: colors[i] });
                }
                draw();
            }

            function distance(p1, p2) {
                return Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
            }

            // 迭代一步
            function step() {
                // 1. Assign: 指派點給最近的中心
                points.forEach(p => {
                    let minDist = Infinity;
                    let bestCluster = -1;
                    centroids.forEach((c, idx) => {
                        const d = distance(p, c);
                        if (d < minDist) {
                            minDist = d;
                            bestCluster = idx;
                        }
                    });
                    p.cluster = bestCluster;
                });

                // 2. Update: 重新計算各中心點
                for (let idx = 0; idx < k; idx++) {
                    const clusterPoints = points.filter(p => p.cluster === idx);
                    if (clusterPoints.length > 0) {
                        let sumX = 0, sumY = 0;
                        clusterPoints.forEach(p => { sumX += p.x; sumY += p.y; });
                        centroids[idx].x = sumX / clusterPoints.length;
                        centroids[idx].y = sumY / clusterPoints.length;
                    }
                }
                draw();
            }

            function draw() {
                cx.clearRect(0, 0, 500, 300);

                // 劃出數據點
                points.forEach(p => {
                    cx.beginPath();
                    cx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    cx.fillStyle = p.cluster !== -1 ? colors[p.cluster] : "#94a3b8";
                    cx.fill();
                    cx.strokeStyle = "rgba(0,0,0,0.5)";
                    cx.lineWidth = 1;
                    cx.stroke();
                });

                // 劃出質心 (大型 X 符號)
                centroids.forEach(c => {
                    cx.beginPath();
                    cx.arc(c.x, c.y, 10, 0, Math.PI * 2);
                    cx.fillStyle = c.color;
                    cx.shadowColor = c.color;
                    cx.shadowBlur = 10;
                    cx.fill();
                    cx.shadowBlur = 0;
                    
                    cx.strokeStyle = "white";
                    cx.lineWidth = 2.5;
                    cx.stroke();
                });
            }

            btnInit.onclick = initData;
            btnStep.onclick = step;

            initData();
        }

        // 9. PCA 降維實驗
        function setupPCA(wrapper, controls) {
            const cv = document.createElement("canvas");
            cv.width = 500;
            cv.height = 300;
            cv.className = "w-full h-full block";
            wrapper.appendChild(cv);
            const cx = cv.getContext("2d");

            controls.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400">投影軸旋轉角度:</span>
                    <input type="range" id="pca-angle" min="0" max="180" step="1" value="30" class="w-32 accent-indigo-500">
                    <span id="pca-angle-val" class="text-xs text-indigo-400 font-bold font-mono">30°</span>
                </div>
            `;

            const slider = document.getElementById("pca-angle");
            const label = document.getElementById("pca-angle-val");

            // 生成具有明顯對角共線性特徵的二維數據
            const points = [];
            for (let i = 0; i < 40; i++) {
                const u = (i - 20) * 10;
                // y = 0.5x + 隨機擾動
                const x = 250 + u + (Math.random() - 0.5) * 30;
                const y = 150 + u * 0.5 + (Math.random() - 0.5) * 30;
                points.push({ x, y });
            }

            function draw() {
                cx.clearRect(0, 0, 500, 300);
                const angleDeg = parseInt(slider.value);
                label.innerText = angleDeg + "°";
                const angleRad = (angleDeg * Math.PI) / 180;

                // 畫中心參考軸與旋轉的投影軸
                cx.beginPath();
                cx.strokeStyle = "#eab308";
                cx.lineWidth = 2;
                const cosA = Math.cos(angleRad);
                const sinA = Math.sin(angleRad);
                cx.moveTo(250 - 200 * cosA, 150 - 200 * sinA);
                cx.lineTo(250 + 200 * cosA, 150 + 200 * sinA);
                cx.stroke();

                // 畫數據點及其在新投影軸上的投影投影垂線
                points.forEach(p => {
                    // 相對中心 (250, 150) 的座標偏移
                    const dx = p.x - 250;
                    const dy = p.y - 150;

                    // 計算在旋轉向量 [cosA, sinA] 上的標量投影
                    const projLen = dx * cosA + dy * sinA;
                    
                    // 投影回畫布絕對座標
                    const projX = 250 + projLen * cosA;
                    const projY = 150 + projLen * sinA;

                    // 畫投影垂線
                    cx.beginPath();
                    cx.strokeStyle = "rgba(100, 116, 139, 0.25)";
                    cx.lineWidth = 1;
                    cx.moveTo(p.x, p.y);
                    cx.lineTo(projX, projY);
                    cx.stroke();

                    // 畫原始點 (藍灰色)
                    cx.beginPath();
                    cx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    cx.fillStyle = "#64748b";
                    cx.fill();

                    // 畫在主成分投影軸上的點 (紫色高亮)
                    cx.beginPath();
                    cx.arc(projX, projY, 3.5, 0, Math.PI * 2);
                    cx.fillStyle = "#a855f7";
                    cx.fill();
                });
            }

            slider.addEventListener("input", draw);
            draw();
        }

        // 10. ANN 深度學習實驗
        function setupANN(wrapper, controls) {
            const cv = document.createElement("canvas");
            cv.width = 500;
            cv.height = 300;
            cv.className = "w-full h-full block";
            wrapper.appendChild(cv);
            const cx = cv.getContext("2d");

            controls.innerHTML = `
                <button id="ann-fire" class="px-3 py-1.5 bg-red-600 hover:bg-red-500 text-white rounded font-bold text-xs transition flex items-center gap-1">
                    <i class="fa-solid fa-bolt"></i> 發射前向傳播訊號
                </button>
            `;

            const btnFire = document.getElementById("ann-fire");

            // 定義神經網路節點座標
            const layers = [
                [ {x: 100, y: 70}, {x: 100, y: 150}, {x: 100, y: 230} ], // 輸入層
                [ {x: 250, y: 50}, {x: 250, y: 110}, {x: 250, y: 170}, {x: 250, y: 230} ], // 隱藏層
                [ {x: 400, y: 100}, {x: 400, y: 200} ] // 輸出層
            ];

            let animProgress = -1; // -1 代表無動畫狀態

            function draw(t = 0) {
                cx.clearRect(0, 0, 500, 300);

                // 畫連接權重線
                cx.lineWidth = 1;
                for (let l = 0; l < layers.length - 1; l++) {
                    const fromLayer = layers[l];
                    const toLayer = layers[l+1];
                    fromLayer.forEach(fromNode => {
                        toLayer.forEach(toNode => {
                            cx.strokeStyle = "rgba(100, 116, 139, 0.12)";
                            cx.beginPath();
                            cx.moveTo(fromNode.x, fromNode.y);
                            cx.lineTo(toNode.x, toNode.y);
                            cx.stroke();

                            // 繪製前向傳播光點動畫
                            if (animProgress >= 0) {
                                // 判斷光點所在段落
                                const layerPart = Math.floor(animProgress); // 0：第一層->第二層, 1：第二層->第三層
                                const progress = animProgress % 1;
                                
                                if (layerPart === l) {
                                    const dotX = fromNode.x + (toNode.x - fromNode.x) * progress;
                                    const dotY = fromNode.y + (toNode.y - fromNode.y) * progress;
                                    cx.beginPath();
                                    cx.arc(dotX, dotY, 2.5, 0, Math.PI * 2);
                                    cx.fillStyle = "#ef4444";
                                    cx.fill();
                                }
                            }
                        });
                    });
                }

                // 畫神經元節點
                layers.forEach((layer, layerIdx) => {
                    layer.forEach(node => {
                        cx.beginPath();
                        cx.arc(node.x, node.y, 10, 0, Math.PI * 2);
                        
                        // 當前傳播波段點亮節點
                        let isLit = false;
                        if (animProgress >= 0) {
                            const layerPart = Math.floor(animProgress);
                            if (layerIdx === layerPart || (layerIdx === 2 && animProgress >= 1.9)) {
                                isLit = true;
                            }
                        }

                        cx.fillStyle = isLit ? "#ef4444" : "#1e293b";
                        cx.shadowColor = "#ef4444";
                        cx.shadowBlur = isLit ? 10 : 0;
                        cx.fill();
                        cx.shadowBlur = 0;

                        cx.strokeStyle = isLit ? "#f87171" : "#475569";
                        cx.lineWidth = 1.5;
                        cx.stroke();
                    });
                });
            }

            function animate() {
                if (animProgress >= 2) {
                    animProgress = -1;
                    draw();
                    return;
                }
                animProgress += 0.04;
                draw();
                animationFrameId = requestAnimationFrame(animate);
            }

            btnFire.onclick = () => {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animProgress = 0;
                animate();
            };

            draw();
        }

        // 初始化
        window.onload = function() {
            renderMenu();
            renderContent();
            initExperiment();
        }
    </script>
