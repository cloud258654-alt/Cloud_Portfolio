name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: kts_test
          POSTGRES_USER: kts_user
          POSTGRES_PASSWORD: kts_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: backend

      - name: Lint with ruff
        run: ruff check .
        working-directory: backend

      - name: Check formatting with black
        run: black --check .
        working-directory: backend

      - name: Test with pytest
        env:
          DATABASE_URL: postgresql+psycopg2://kts_user:kts_password@localhost:5432/kts_test
          JWT_SECRET_KEY: ci-test-key
          APP_SECRET_KEY: ci-test-key
          POSTGRES_HOST: localhost
          POSTGRES_DB: kts_test
        run: pytest --tb=short
        working-directory: backend

      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit
        working-directory: backend
        continue-on-error: true

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true
