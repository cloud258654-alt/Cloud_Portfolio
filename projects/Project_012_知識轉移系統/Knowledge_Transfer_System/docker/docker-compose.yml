name: kts

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kts_db}
      POSTGRES_USER: ${POSTGRES_USER:-kts_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kts_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kts_postgres_data:/var/lib/postgresql/data
      - ../database/schema_v1.sql:/docker-entrypoint-initdb.d/01_schema_v1.sql:ro
      - ../database/seed_v1.sql:/docker-entrypoint-initdb.d/02_seed_v1.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kts_user} -d ${POSTGRES_DB:-kts_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kts_network

  redis:
    image: redis:7-alpine
    container_name: kts_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - kts_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kts_network

  minio:
    image: minio/minio:latest
    container_name: kts_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - kts_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kts_network

  minio-init:
    image: minio/mc:latest
    container_name: kts_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET_DOCUMENTS:-documents};
      mc mb -p local/${MINIO_BUCKET_MEDIA:-media};
      mc mb -p local/${MINIO_BUCKET_EXPORTS:-exports};
      exit 0;
      "
    networks:
      - kts_network

  backend:
    profiles: ["app"]
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kts_backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/admin/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kts_network

  worker:
    profiles: ["app"]
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kts_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - kts_network

  frontend:
    profiles: ["app"]
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kts_frontend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - kts_network

  nginx:
    profiles: ["app"]
    image: nginx:alpine
    container_name: kts_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - kts_network

  admin-init:
    profiles: ["app"]
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kts_admin_init
    command: python scripts/create_admin.py
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kts_network

  qdrant:
    profiles: ["optional"]
    image: qdrant/qdrant:latest
    container_name: kts_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - kts_qdrant_data:/qdrant/storage
    networks:
      - kts_network

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    container_name: kts_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    networks:
      - kts_network

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    container_name: kts_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - kts_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - kts_network

volumes:
  kts_postgres_data:
  kts_redis_data:
  kts_minio_data:
  kts_qdrant_data:
  kts_grafana_data:

networks:
  kts_network:
    driver: bridge
